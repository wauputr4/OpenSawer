name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    attributes:
      label: Relevant logs
      description: Remove secrets, payment details, and donor personal data.

